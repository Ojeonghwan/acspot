services:
  jenkins:
    build:
      context: ./jenkins
    container_name: acspot-jenkins
    restart: unless-stopped
    user: root
    ports:
      - "8081:8080"
    environment:
      JAVA_OPTS: -Djenkins.install.runSetupWizard=false
      JENKINS_ADMIN_ID: ${JENKINS_ADMIN_ID}
      JENKINS_ADMIN_PASSWORD: ${JENKINS_ADMIN_PASSWORD}
      ACSPOT_REPOSITORY_URL: ${ACSPOT_REPOSITORY_URL:-https://github.com/Ojeonghwan/acspot.git}
    volumes:
      - acspot-jenkins-home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - /opt/acspot:/opt/acspot

volumes:
  acspot-jenkins-home:
