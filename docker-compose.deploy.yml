services:
  db:
    image: postgis/postgis:16-3.4
    container_name: acspot-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: acspot
      POSTGRES_USER: acspot
      POSTGRES_PASSWORD: acspot
    volumes:
      - acspot-db-data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U acspot -d acspot"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: acspot-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/acspot
      SPRING_DATASOURCE_USERNAME: acspot
      SPRING_DATASOURCE_PASSWORD: acspot
    expose:
      - "8080"

  frontend:
    build:
      context: ./frontend
    container_name: acspot-frontend
    restart: unless-stopped
    depends_on:
      - backend
    env_file:
      - ./frontend/.env.local
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://43.201.114.216
    expose:
      - "3000"

  nginx:
    image: nginx:1.27-alpine
    container_name: acspot-nginx
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  acspot-db-data:
