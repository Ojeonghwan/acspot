spring:
  application:
    name: acspot-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/acspot}
    username: ${SPRING_DATASOURCE_USERNAME:acspot}
    password: ${SPRING_DATASOURCE_PASSWORD:acspot}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false

server:
  port: 8080

springdoc:
  swagger-ui:
    path: /swagger-ui.html
